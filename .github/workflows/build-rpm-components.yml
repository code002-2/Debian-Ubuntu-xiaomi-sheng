name: Build Component RPMs (Fedora)

on:
  workflow_dispatch:
    inputs:
      component:
        description: '组件 (all, firmware, alsa, devauth, sensors)'
        required: true
        type: choice
        options: [all, firmware, alsa, devauth, sensors]
        default: 'all'
  push:
    branches: [main, master, sheng]
    paths:
      - 'rpm/*.spec'
      - 'rpm/build.sh'
      - '.github/workflows/build-rpm-components.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  firmware:
    name: Build firmware RPM
    if: ${{ github.event_name == 'push' || github.event.inputs.component == 'all' || github.event.inputs.component == 'firmware' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: |
          sudo apt update
          sudo apt install -y rpm git

      - name: Build firmware RPM
        run: |
          git clone --depth 1 https://github.com/lzxcr/linux-firmware-sheng.git /tmp/fw
          mkdir -p firmware-xiaomi-sheng/usr/lib/firmware
          if [ -d /tmp/fw/lib ]; then
            cp -r /tmp/fw/lib/* firmware-xiaomi-sheng/usr/lib/firmware/
          else
            cp -r /tmp/fw/* firmware-xiaomi-sheng/usr/lib/firmware/ || true
          fi
          rm -rf /tmp/fw

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp rpm/firmware-xiaomi-sheng.spec rpmbuild/SPECS/

          rpmbuild -bb --define "_topdir $PWD/rpmbuild" rpmbuild/SPECS/firmware-xiaomi-sheng.spec

          mkdir -p rpm-output
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} rpm-output/ \;
          ls -la rpm-output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-rpm
          path: rpm-output/*.rpm
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          update: true
          tag_name: firmware-fedora
          name: "firmware-xiaomi-sheng (Fedora RPM)"
          files: rpm-output/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  alsa:
    name: Build ALSA UCM2 RPM
    if: ${{ github.event_name == 'push' || github.event.inputs.component == 'all' || github.event.inputs.component == 'alsa' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: |
          sudo apt update
          sudo apt install -y rpm git

      - name: Build ALSA RPM
        run: |
          git clone --depth 1 https://github.com/map220v/alsa-ucm-conf.git /tmp/alsa
          mkdir -p alsa-xiaomi-sheng/usr/share/alsa/ucm2
          if [ -d /tmp/alsa/ucm2 ]; then
            cp -r /tmp/alsa/ucm2/* alsa-xiaomi-sheng/usr/share/alsa/ucm2/
          else
            cp -r /tmp/alsa/* alsa-xiaomi-sheng/usr/share/alsa/ucm2/ || true
          fi
          rm -rf /tmp/alsa

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp rpm/alsa-xiaomi-sheng.spec rpmbuild/SPECS/

          rpmbuild -bb --define "_topdir $PWD/rpmbuild" rpmbuild/SPECS/alsa-xiaomi-sheng.spec

          mkdir -p rpm-output
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} rpm-output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alsa-rpm
          path: rpm-output/*.rpm
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          update: true
          tag_name: alsa-fedora
          name: "alsa-xiaomi-sheng (Fedora RPM)"
          files: rpm-output/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  devauth:
    name: Build devauth RPM
    if: ${{ github.event_name == 'push' || github.event.inputs.component == 'all' || github.event.inputs.component == 'devauth' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y rpm build-essential git

      - name: Build devauth binary + RPM
        run: |
          git clone https://github.com/map220v/sheng_devauth.git /tmp/devauth
          cd /tmp/devauth
          make

          mkdir -p "$GITHUB_WORKSPACE/sheng-devauth/usr/bin"
          mkdir -p "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system"
          cp xiaomi_devauth "$GITHUB_WORKSPACE/sheng-devauth/usr/bin/"

          echo '[Unit]' > "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo 'Description=Xiaomi Keyboard Authentication Service' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo 'After=multi-user.target' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo '' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo '[Service]' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo 'Type=simple' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo 'ExecStart=/usr/bin/xiaomi_devauth' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo 'Restart=always' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo 'RestartSec=5' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo '' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo '[Install]' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"
          echo 'WantedBy=multi-user.target' >> "$GITHUB_WORKSPACE/sheng-devauth/usr/lib/systemd/system/sheng-devauth.service"

          cd "$GITHUB_WORKSPACE"

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp rpm/sheng-devauth.spec rpmbuild/SPECS/

          rpmbuild -bb --define "_topdir $PWD/rpmbuild" rpmbuild/SPECS/sheng-devauth.spec

          mkdir -p rpm-output
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} rpm-output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devauth-rpm
          path: rpm-output/*.rpm
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          update: true
          tag_name: sheng_devauth-fedora
          name: "sheng-devauth (Fedora RPM)"
          files: rpm-output/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sensors:
    name: Build sensors RPM
    if: ${{ github.event_name == 'push' || github.event.inputs.component == 'all' || github.event.inputs.component == 'sensors' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: |
          sudo apt update
          sudo apt install -y rpm wget

      - name: Build sensors RPM
        run: |
          wget -q -O source.tar.gz \
            https://github.com/alghiffaryfa19/sheng-sensors-file/archive/199754bb37ae6d4706bd8d4b23e9e6fec2d959cc.tar.gz
          tar -xf source.tar.gz
          mv sheng-sensors-file-* sheng-sensors-src

          mkdir -p sheng-sensors/usr
          if [ -d sheng-sensors-src/usr ]; then
            cp -r sheng-sensors-src/usr/* sheng-sensors/usr/
          fi

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp rpm/sheng-sensors.spec rpmbuild/SPECS/

          rpmbuild -bb --define "_topdir $PWD/rpmbuild" rpmbuild/SPECS/sheng-sensors.spec

          mkdir -p rpm-output
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} rpm-output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sensors-rpm
          path: rpm-output/*.rpm
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          update: true
          tag_name: sensors-fedora
          name: "sheng-sensors (Fedora RPM)"
          files: rpm-output/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
