name: Build Kernel with Upstream Patches

on:
  workflow_dispatch: # 允许在 GitHub 网页上手动点击触发

jobs:
  build:
    name: "全自动合并上游并构建内核"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: "📥 检出代码"
        uses: actions/checkout@v4
        with:
          # 跨仓库合并补丁需要更多的提交历史作为“共同祖先”基础，此处设为 120 深度
          fetch-depth: 120
          submodules: false

      - name: "💾 设置ccache缓存"
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-upstream-kernel-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-upstream-kernel-

      - name: "🔧 设置构建环境"
        run: |
          echo "⚙️ 正在安装必要的构建工具..."
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc ccache clang llvm lld wget xz-utils
          echo "✅ 构建工具安装完成"
          
          # 确保ccache目录存在
          mkdir -p /home/runner/.ccache
          
          # 优化ccache配置
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros
          
          echo "📊 缓存恢复状态: ${{ steps.cache-ccache.outputs.cache-hit }}"

      - name: "🔨 自动合并上游并编译内核"
        id: build
        run: |
          echo "🚀 开始执行全自动合并与编译流程..."
          echo "💾 缓存状态: ${{ steps.cache-ccache.outputs.cache-hit }}"
          
          # 设置ccache环境变量，确保编译过程正常调用
          export CCACHE_DIR=/home/runner/.ccache
          export CCACHE_MAXSIZE=10G
          export PATH="/usr/lib/ccache:$PATH"
          
          # 执行专用的上游同步编译脚本
          chmod +x sheng-kernel_upstream_build.sh
          bash sheng-kernel_upstream_build.sh "${{ github.workspace }}"
          
          echo "✅ 内核编译与打包完成"
          echo "📊 编译后ccache统计:"
          ccache --show-stats --verbose | grep -E "(hit rate|cache hit|cache miss|max size)" || true

      - name: "📦 收集编译产物"
        id: collect_artifacts
        run: |
          echo "🔍 查找编译出的 .deb 软件包..."
          find . -name "*.deb" -type f | head -20
          
          echo "📁 编译产物列表:"
          ls -la *.deb 2>/dev/null || echo "⚠️  未找到 .deb 文件"
          echo ""
          echo "📊 文件大小统计:"
          du -h *.deb 2>/dev/null || echo "暂无产物文件"
          
          # 统计包数量并输出
          PKG_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          echo "📦 共找到 $PKG_COUNT 个包文件"
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: "📤 上传构建产物"
        uses: actions/upload-artifact@v4
        with:
          name: kernel-upstream-deb-packages
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: Upload single boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot_single_upstream.img
          path: ${{ github.workspace }}/boot_sheng_singleboot.img

      - name: Upload dual boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot_dual_upstream.img
          path: ${{ github.workspace }}/boot_sheng_dualboot.img

      - name: "🏷️ 创建 GitHub Release"
        if: steps.collect_artifacts.outputs.pkg_count > 0 && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel-upstream-latest
          name: "Kernel Upstream Latest"
          body: |
            🧩 基于最新 Linux 7.1/7.x 官方主线补丁自动合并构建的内核镜像
            
            --- 
            
            ### 🔧 构建信息
            | 项目 | 详情 |
            |------|------|
            | 补丁机制 | 自动查询并追踪 Linux kernel.org 官方最新 Tag |
            | 构建方式 | GitHub Actions 原生 ARM 自动编译 |
            
            --- 
            
            ### 📦 包含组件
            - linux-xiaomi-sheng.deb (合并最新补丁后的内核及模块)
            - firmware-xiaomi-sheng.deb  
            - alsa-xiaomi-sheng.deb
            - boot_sheng_singleboot.img
            - boot_sheng_dualboot.img
          draft: false
          prerelease: false
          files: |
            *.deb
            *.img
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
