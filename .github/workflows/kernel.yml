name: Build Kernel

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'sheng-kernel_build.sh'
      - '.github/workflows/kernel.yml'
      - 'sm8550.config'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: "构建内核 (ianchb/sm8550-mainline)"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 ccache 编译缓存
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('sm8550.config') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: 部署 LLVM 交叉编译环境
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc ccache clang llvm lld wget xz-utils systemd-ukify systemd-boot-efi
          mkdir -p /home/runner/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros

      - name: 编译内核
        id: build
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export CCACHE_MAXSIZE=10G
          export PATH="/usr/lib/ccache:$PATH"
          chmod +x sheng-kernel_build.sh
          bash sheng-kernel_build.sh
          ccache --show-stats || true

      - name: 获取内核版本
        id: version
        run: |
          KVER=$(ls linux-xiaomi-sheng/usr/lib/modules/ 2>/dev/null | head -1 || echo "unknown")
          echo "kernel_version=$KVER" >> $GITHUB_OUTPUT

      - name: 上传 .deb 驱动包
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: 上传 EFI 引导镜像
        uses: actions/upload-artifact@v4
        with:
          name: efi-boot
          path: bootaa64.efi
          retention-days: 7
          if-no-files-found: ignore

      - name: 上传启动镜像 (boot.img)
        uses: actions/upload-artifact@v4
        with:
          name: boot-images
          path: |
            boot_sheng_singleboot.img
            boot_sheng_dualboot.img
          retention-days: 7
          if-no-files-found: ignore

      - name: 自动发布 GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: kernel-${{ steps.version.outputs.kernel_version }}
          name: "Kernel v${{ steps.version.outputs.kernel_version }}"
          body: |
            **小米Pad6spro 内核 v${{ steps.version.outputs.kernel_version }}**

            | 项目 | 详情 |
            |------|------|
            | 源码 | [ianchb/sm8550-mainline](https://github.com/ianchb/sm8550-mainline) |
            | 内核版本 | ${{ steps.version.outputs.kernel_version }} |
            | 架构 | ARM64 (sm8550) |
          files: |
            *.deb
            *.img
            bootaa64.efi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
