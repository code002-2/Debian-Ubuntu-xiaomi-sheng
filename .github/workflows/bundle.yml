name: Build Kernel Bundle

on:
  workflow_run:
    workflows: ["Build Kernel"]
    types:
      - completed
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bundle:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4

    - name: 下载内核包
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir bundle && cd bundle

        echo "下载内核包 (latest release)..."
        gh release download --repo "${{ github.repository }}" \
          --pattern "linux-*.deb" \
          --clobber || { echo "错误: 下载内核包失败" >&2; exit 1; }

        echo "下载 devauth..."
        gh release download "sheng_devauth" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || { echo "错误: 下载 devauth 失败" >&2; exit 1; }

        echo "下载 sensors..."
        gh release download "sensors" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || { echo "错误: 下载 sensors 失败" >&2; exit 1; }

        echo "下载 alsa..."
        gh release download "alsa" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || { echo "错误: 下载 alsa 失败" >&2; exit 1; }

        COUNT=$(ls *.deb 2>/dev/null | wc -l)
        echo "Bundle validated: $COUNT packages"
        if [ "$COUNT" -lt 3 ]; then
          echo "包数量不足 (需要 >=3, 实际 $COUNT)"
          exit 1
        fi

    - name: 创建 Bundle Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: kernel-bundle-latest
        name: "Kernel Bundle (ianchb/sm8550-mainline)"
        body: |
          **小米Pad6spro 内核 Bundle**

          | 项目 | 详情 |
          |------|------|
          | 源码 | [ianchb/sm8550-mainline](https://github.com/ianchb/sm8550-mainline) |
          | 包含 | linux-xiaomi-sheng, firmware, alsa, devauth, sensors |
        files: bundle/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
