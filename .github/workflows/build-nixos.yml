name: 🌀 Build NixOS Desktop

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-nixos:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install Tools (sparse & ext4 utils)
        # ✨ 增加了 jq 工具，用于完美提取哈希值
        run: sudo apt update && sudo apt-get install -y android-sdk-libsparse-utils e2fsprogs p7zip-full jq

      - name: 🔄 Update Nix Flake Lock
        run: nix flake update --flake ./nixos-sheng

      - name: 🔍 一次性暴击：批量获取所有哈希值
        # ✨ 插入的终极魔法脚本：强制连网下载并提取所有包的真实哈希
        run: |
          echo "🚀 开始全自动计算剩余所有的真实哈希值..."
          urls=(
            "http://ftp.br.debian.org/debian/pool/main/m/mesa/mesa-common-dev_26.0.7-1_arm64.deb"
            "https://github.com/code002-2/Xiaomi-pad-6s-pro-Linux/releases/download/kernel-bundle-7.0/linux-xiaomi-sheng.deb"
            "https://github.com/code002-2/Xiaomi-pad-6s-pro-Linux/releases/download/kernel-bundle-7.0/firmware-xiaomi-sheng.deb"
            "https://github.com/code002-2/Xiaomi-pad-6s-pro-Linux/releases/download/kernel-bundle-7.0/alsa-xiaomi-sheng.deb"
            "https://github.com/code002-2/Xiaomi-pad-6s-pro-Linux/releases/download/kernel-bundle-7.0/fastrpc_1.0.2-1_arm64.deb"
            "https://github.com/code002-2/Xiaomi-pad-6s-pro-Linux/releases/download/kernel-bundle-7.0/iio-sensor-proxy_99993.8-6_arm64.deb"
            "https://github.com/code002-2/Xiaomi-pad-6s-pro-Linux/releases/download/kernel-bundle-7.0/libssc_0.4.2-1_arm64.deb"
            "https://github.com/code002-2/Xiaomi-pad-6s-pro-Linux/releases/download/kernel-bundle-7.0/sheng-sensors_20240917-1_arm64.deb"
            "https://github.com/code002-2/Xiaomi-pad-6s-pro-Linux/releases/download/kernel-bundle-7.0/sheng-devauth.deb"
          )
          for url in "${urls[@]}"; do
            echo "📥 正在获取: $url"
            HASH=$(nix store prefetch-file "$url" --json | jq -r '.hash')
            echo "✅ 真实哈希: $HASH"
            echo "---------------------------------------------------"
          done

      - name: 🔨 Build NixOS Tarball
        id: build_nix
        run: nix build ./nixos-sheng#nixosConfigurations.sheng.config.system.build.tarball

      - name: 🗜️ Pack to Ext4 Sparse Image
        run: |
          mkdir -p rootfs
          echo "⬇️ Extracting NixOS tarball..."
          tar -xvf result/tarball/*.tar.xz -C rootfs
          
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          RAW_IMG="nixos_sheng_${TIMESTAMP}.img"
          SPARSE_IMG="sparse_${RAW_IMG}"
          
          echo "💿 Creating 8G raw ext4 image (no sudo/mount required!)..."
          truncate -s 8G "$RAW_IMG"
          mke2fs -t ext4 -O ^has_journal -d rootfs/ "$RAW_IMG" 8G
          
          echo "🔄 Converting to fastboot sparse image..."
          img2simg "$RAW_IMG" "$SPARSE_IMG"
          
          echo "📦 Compressing with 7z..."
          7z a "nixos_sheng_${TIMESTAMP}.7z" "$SPARSE_IMG"
          
          echo "FILE_NAME=nixos_sheng_${TIMESTAMP}.7z" >> $GITHUB_ENV

      - name: 🚀 Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "nixos-$(date -u '+%Y%m%d')"
          files: ${{ env.FILE_NAME }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
