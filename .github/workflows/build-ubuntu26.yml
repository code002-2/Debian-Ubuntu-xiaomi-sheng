name: 🐧 Build Ubuntu 26.04 Desktop (GNOME/KDE/Xfce)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        default: '7.0'
      desktop_environment:
        description: '桌面环境'
        type: choice
        options:
          - gnome
          - kde
          - xfce
        default: 'gnome'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="ubuntu26-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Ubuntu 26.04 Desktop - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🐧 Ubuntu 26.04 LTS (Resolute Raccoon) Desktop
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | Ubuntu版本 | 26.04 LTS (Resolute) |
            | 内核版本 | ${{ github.event.inputs.kernel_version }} |
            | 桌面环境 | ${{ github.event.inputs.desktop_environment }} |
            
            ---
            
            ### 🔐 默认凭据
            - 用户名: `luser`
            - 密码: `luser`
            - 桌面: ${{ github.event.inputs.desktop_environment == 'gnome' && 'GNOME + GDM3' || github.event.inputs.desktop_environment == 'kde' && 'KDE Plasma + SDDM' || 'Xfce + LightDM' }}
            
            ---
            
            ### 🌐 语言环境
            - 系统语言: 英文 (en_US.UTF-8)
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Build Ubuntu 26.04 Desktop (${{ github.event.inputs.desktop_environment }})
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap p7zip-full curl
      - name: Download kernel bundle
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RootFS
        id: build
        run: |
          chmod +x build-ubuntu26-rootfs.sh
          sudo ./build-ubuntu26-rootfs.sh ${{ github.event.inputs.kernel_version }} ${{ github.event.inputs.desktop_environment }}
          SEVEN_Z_FILE=$(ls ubuntu26_${{ github.event.inputs.desktop_environment }}_*.7z | head -1)
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename }}
          path: ${{ steps.build.outputs.path }}
          retention-days: 7
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
