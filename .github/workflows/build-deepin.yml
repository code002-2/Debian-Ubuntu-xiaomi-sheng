name: 🌀 Build Deepin V23 Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="deepin-v23-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Deepin V23 Desktop - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🌀 Pure Deepin V23 (Beige) OS For SM8550
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deepin:
    name: Build Deepin V23 RootFS
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap p7zip-full curl

      - name: Download kernel bundle
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          gh release download "kernel-bundle-${KERNEL_VER}" --pattern "*.deb" --repo "${{ github.repository }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          
          # ✨ 这里指向刚刚新建的专属 Deepin 脚本
          chmod +x deepin-rootfs_build.sh
          sudo ./deepin-rootfs_build.sh deepin ${KERNEL_VER}
          
          SEVEN_Z_FILE=$(ls deepin_v23_desktop_*.7z | head -1)
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin-v23-desktop
          path: ${{ steps.build.outputs.path }}
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
