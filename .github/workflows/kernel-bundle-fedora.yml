name: Build Kernel Bundle (Fedora RPM)

on:
  workflow_run:
    workflows: ["Build Kernel"]
    types:
      - completed
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bundle:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y rpm

      - name: 下载内核 DEB 并重打包为 RPM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "下载内核 DEB 包 (latest release)..."
          mkdir -p bundle
          gh release download --repo "${{ github.repository }}" \
            --pattern "linux-*.deb" \
            --dir bundle/ \
            --clobber || { echo "错误: 下载内核包失败" >&2; exit 1; }

          echo "解压 DEB 并重打包为 RPM..."
          mkdir -p linux-xiaomi-sheng
          for deb in bundle/linux-*.deb; do
            [ -f "$deb" ] || continue
            echo "  处理: $(basename $deb)"
            dpkg-deb --fsys-tarfile "$deb" | tar -x -C linux-xiaomi-sheng/
          done

          KVER=$(ls linux-xiaomi-sheng/usr/lib/modules/ 2>/dev/null | head -1 || echo "0.0")
          echo "内核版本: $KVER"

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mv linux-xiaomi-sheng rpmbuild/BUILD/
          cp rpm/linux-xiaomi-sheng.spec rpmbuild/SPECS/

          rpmbuild -bb --define "_topdir $PWD/rpmbuild" \
            --define "kernel_version ${KVER}" \
            rpmbuild/SPECS/linux-xiaomi-sheng.spec

          mkdir -p bundle-fedora
          find rpmbuild/RPMS -name "*.rpm" -exec cp {} bundle-fedora/ \;
          echo "内核 RPM:"
          ls -la bundle-fedora/

      - name: 下载 firmware RPM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "firmware-fedora" \
            --pattern "*.rpm" \
            --repo "${{ github.repository }}" \
            --dir bundle-fedora/ \
            --clobber || echo "警告: firmware RPM 下载失败"

      - name: 下载 ALSA RPM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "alsa-fedora" \
            --pattern "*.rpm" \
            --repo "${{ github.repository }}" \
            --dir bundle-fedora/ \
            --clobber || echo "警告: alsa RPM 下载失败"

      - name: 下载 devauth RPM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "sheng_devauth-fedora" \
            --pattern "*.rpm" \
            --repo "${{ github.repository }}" \
            --dir bundle-fedora/ \
            --clobber || echo "警告: devauth RPM 下载失败"

      - name: 下载 sensors RPM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "sensors-fedora" \
            --pattern "*.rpm" \
            --repo "${{ github.repository }}" \
            --dir bundle-fedora/ \
            --clobber || echo "警告: sensors RPM 下载失败"

      - name: Validate bundle
        run: |
          COUNT=$(ls bundle-fedora/*.rpm 2>/dev/null | wc -l)
          echo "Bundle contains $COUNT RPMs:"
          ls -la bundle-fedora/

      - name: Create bundle release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-bundle-fedora-latest
          name: "Kernel Bundle Fedora (ianchb/sm8550-mainline)"
          body: |
            **Fedora RPM 内核 Bundle**

            | 项目 | 详情 |
            |------|------|
            | 源码 | [ianchb/sm8550-mainline](https://github.com/ianchb/sm8550-mainline) |
            | 包含 | linux-xiaomi-sheng, firmware, alsa, devauth, sensors |
          files: bundle-fedora/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
